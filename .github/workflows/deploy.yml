name: 자바 CD (Gradle & ECS)

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  # [release] 브랜치에 push 할 시 워크플로우 트리거
  push:
    branches: [ "release" ]

# 읽기 권한 부여
permissions:
  contents: read

jobs:
  deploy:
    name: 서비스 빌드 및 ECS 배포
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 애플리케이션 빌드 (JAR)
        run: ./gradlew build -x test

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 ECR 푸시
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: ECS 태스크 정의 다운로드 및 정리
        env:
          TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_DEFINITION" --query taskDefinition > raw-task-def.json
          cat raw-task-def.json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > task-definition.json

      - name: 새 이미지 주소 및 환경 변수로 태스크 정의 렌더링
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: mopl-app
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            SPRING_PROFILES_ACTIVE=prod
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }}
            S3_REGION=${{ vars.S3_REGION || 'ap-northeast-2' }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            SPRING_CACHE_TYPE=redis
            SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}
            SPRING_DATA_REDIS_PORT=${{ secrets.SPRING_DATA_REDIS_PORT || '6379' }}
            SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}
            SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.SPRING_KAFKA_BOOTSTRAP_SERVERS }}
            SPRING_KAFKA_CONSUMER_GROUP_ID=${{ secrets.SPRING_KAFKA_CONSUMER_GROUP_ID }}
            SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=${{ secrets.SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET || 'latest' }}
            KAFKA_API_KEY=${{ secrets.KAFKA_API_KEY }}
            KAFKA_API_SECRET=${{ secrets.KAFKA_API_SECRET }}
            MOPL_JWT_ISSUER=${{ vars.MOPL_JWT_ISSUER || 'mopl' }}
            MOPL_JWT_SECRET=${{ secrets.MOPL_JWT_SECRET }}
            MOPL_ACCESS_TOKEN_EXPIRATION_SECONDS=${{ vars.MOPL_ACCESS_TOKEN_EXPIRATION_SECONDS || '1800' }}
            MOPL_REFRESH_TOKEN_EXPIRATION_SECONDS=${{ vars.MOPL_REFRESH_TOKEN_EXPIRATION_SECONDS || '604800' }}
            MOPL_REFRESH_TOKEN_COOKIE_NAME=${{ vars.MOPL_REFRESH_TOKEN_COOKIE_NAME || 'refresh_token' }}
            MOPL_REFRESH_TOKEN_COOKIE_SECURE=true
            MOPL_REFRESH_TOKEN_COOKIE_SAME_SITE=${{ vars.MOPL_REFRESH_TOKEN_COOKIE_SAME_SITE || 'Lax' }}
            GOOGLE_OAUTH_CLIENT_ID=${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            KAKAO_OAUTH_CLIENT_ID=${{ vars.KAKAO_OAUTH_CLIENT_ID }}
            KAKAO_OAUTH_CLIENT_SECRET=${{ secrets.KAKAO_OAUTH_CLIENT_SECRET }}
            MOPL_OAUTH2_SUCCESS_REDIRECT_URI=${{ vars.MOPL_OAUTH2_SUCCESS_REDIRECT_URI || 'https://mopl.kr/#/contents' }}
            MOPL_OAUTH2_FAILURE_REDIRECT_URI=${{ vars.MOPL_OAUTH2_FAILURE_REDIRECT_URI || 'https://mopl.kr/#/sign-in' }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MOPL_MAIL_FROM=${{ secrets.MOPL_MAIL_FROM }}
            MOPL_MAIL_FROM_NAME=${{ secrets.MOPL_MAIL_FROM_NAME }}
            MOPL_ADMIN_EMAIL=${{ secrets.MOPL_ADMIN_EMAIL }}
            MOPL_ADMIN_PASSWORD=${{ secrets.MOPL_ADMIN_PASSWORD }}
            SPRING_ELASTICSEARCH_URIS=${{ secrets.SPRING_ELASTICSEARCH_URIS }}

      - name: 새 태스크 정의 배포 (Rolling Update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
