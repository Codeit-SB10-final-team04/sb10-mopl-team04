name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # [dev] 브랜치에 PR을 올리거나, [dev,main] 브랜치에 push 할 시 워크플로우 트리거
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - main

# 읽기 권한 부여
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # gradlew에 execute 권한 부여
      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      # 1. 빌드 및 품질 검사 (CheckStyle, SpotBugs 실행)
      - name: Run Build and Quality Checks
        run: ./gradlew clean build jacocoTestReport --no-daemon

      # 2. 커버리지 규칙 검증 (80% 미만 시 실패)
      - name: Verify JaCoCo Coverage
        run: ./gradlew jacocoTestCoverageVerification

      # 3. 리포트 아티팩트 업로드
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            build/reports/

      # 4. Codecov에 커버리지 업로드
      - name: Upload coverage to Codecov
        if: ${{ success() && env.CODECOV_TOKEN != '' && hashFiles('build/reports/jacoco/test/jacocoTestReport.xml') != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: true