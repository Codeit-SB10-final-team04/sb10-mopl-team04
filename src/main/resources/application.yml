spring:
  application:
    name: mopl
  profiles:
    active: dev

server:
  port: 8080

tmdb:
  api:
    key: ${TMDB_API_KEY}

playlist:
  hard-delete:
    cron: "0 1 0 * * *"
    retention-months: 1

content:
  hard-delete:
    cron: "0 0 2 * * MON"
    retention-days: 1

review:
  hard-delete:
    cron: "0 30 2 * * MON"
    retention-days: 1

mopl:
  jwt:
    issuer: ${MOPL_JWT_ISSUER:mopl}
    access-token-expiration-seconds: ${MOPL_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
    refresh-token-expiration-seconds: ${MOPL_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
    refresh-token-cookie-name: ${MOPL_REFRESH_TOKEN_COOKIE_NAME:REFRESH_TOKEN}