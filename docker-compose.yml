# 서비스 정의
services:
  app: # 애플리케이션 서비스
    build: .  # 현재 디렉터리의 Dockerfile을 사용해 이미지 build
    image: mopl:local
    environment: &app-env
      SERVER_PORT: ${SERVER_PORT}
      TMDB_API_KEY: ${TMDB_API_KEY}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_CACHE_TYPE: ${SPRING_CACHE_TYPE}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      SPRING_KAFKA_CONSUMER_GROUP_ID: ${SPRING_KAFKA_CONSUMER_GROUP_ID}
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: ${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET}

      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

      MOPL_JWT_ISSUER: ${MOPL_JWT_ISSUER}
      MOPL_JWT_SECRET: ${MOPL_JWT_SECRET}
      MOPL_ACCESS_TOKEN_EXPIRATION_SECONDS: ${MOPL_ACCESS_TOKEN_EXPIRATION_SECONDS}
      MOPL_REFRESH_TOKEN_EXPIRATION_SECONDS: ${MOPL_REFRESH_TOKEN_EXPIRATION_SECONDS}
      MOPL_REFRESH_TOKEN_COOKIE_NAME: ${MOPL_REFRESH_TOKEN_COOKIE_NAME}
      MOPL_REFRESH_TOKEN_COOKIE_SECURE: ${MOPL_REFRESH_TOKEN_COOKIE_SECURE}
      MOPL_REFRESH_TOKEN_COOKIE_SAME_SITE: ${MOPL_REFRESH_TOKEN_COOKIE_SAME_SITE}

      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE}
      MOPL_MAIL_FROM: ${MOPL_MAIL_FROM}
      MOPL_MAIL_FROM_NAME: ${MOPL_MAIL_FROM_NAME}

      MOPL_ADMIN_ENABLED: ${MOPL_ADMIN_ENABLED}
      MOPL_ADMIN_EMAIL: ${MOPL_ADMIN_EMAIL}
      MOPL_ADMIN_PASSWORD: ${MOPL_ADMIN_PASSWORD}
      MOPL_ADMIN_NAME: ${MOPL_ADMIN_NAME}

      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-disabled}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-disabled}
      KAKAO_OAUTH_CLIENT_ID: ${KAKAO_OAUTH_CLIENT_ID:-disabled}
      KAKAO_OAUTH_CLIENT_SECRET: ${KAKAO_OAUTH_CLIENT_SECRET:-disabled}
      MOPL_OAUTH2_SUCCESS_REDIRECT_URI: ${MOPL_OAUTH2_SUCCESS_REDIRECT_URI:-http://localhost:8080/#/contents}
      MOPL_OAUTH2_FAILURE_REDIRECT_URI: ${MOPL_OAUTH2_FAILURE_REDIRECT_URI:-http://localhost:8080/#/sign-in}

    ports: # 포트 매핑(로컬:컨테이너)
      - "8080:8080"
    volumes: # 애플리케이션 볼륨 구성
      # 컨테이너가 재시작되어도 파일 저장소 데이터 유지 (uploads/ 단일 루트, 하위에 thumbnails/ 등 자동 생성)
      - ./.mopl/storage:/app/uploads
      - ./.logs:/app/.logs
    depends_on: # 서비스간 의존성 설정
      postgres:
        # PostgreSQL 서비스가 정상 상태(healthy)가 된 후 app 서비스가 실행되도록 설정
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      # backend 네트워크에 app 서비스 연결
      - backend

  # 다중 서버 테스트용 두 번째 앱 인스턴스 (docker-compose --profile multi up -d)
  app-2:
    build: .
    image: mopl:local
    environment:
      <<: *app-env
      MOPL_ADMIN_ENABLED: false
      MOPL_OAUTH2_SUCCESS_REDIRECT_URI: ${MOPL_OAUTH2_SUCCESS_REDIRECT_URI:-http://localhost:8081/#/contents}
      MOPL_OAUTH2_FAILURE_REDIRECT_URI: ${MOPL_OAUTH2_FAILURE_REDIRECT_URI:-http://localhost:8081/#/sign-in}
    ports:
      - "8081:8080"
    volumes:
      - ./.mopl/storage:/app/uploads
      - ./.logs:/app/.logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - multi

  postgres: # PostgreSQL 서비스
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes: # PostgreSQL 볼륨 구성
      # 컨테이너 재시작되어도 PostgreSQL 데이터가 유지되도록 설정
      - postgres-data:/var/lib/postgresql/data
      # 서비스 실행 후 `schema.sql`이 자동으로 실행되도록 구성
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck: # PostgreSQL 서비스 상태 확인을 위한 healthcheck 구성
      # 지정한 사용자/db 기준으로 PostgreSQL 준비 상태 확인
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      # 10초마다 확인
      interval: 10s
      # 각 healthcheck의 최대 대기 시간
      timeout: 5s
      # 3번 재시도 후 실패 처리
      retries: 3
    networks:
      # backend 네트워크에 postgres 서비스 연결
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "broker:29092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    container_name: elasticsearch
    environment:
      # 단일 노드 실행
      - discovery.type=single-node
      # 보안 설정 (개발: false, 프로덕션: true)
      - xpack.security.enabled=${ES_SECURITY_ENABLED:-false}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      # 컨테이너 재시작 시에도 ES 인덱스 데이터가 유지되도록 설정
      - elasticsearch-data:/usr/share/elasticsearch/data
    command: >
      bash -c '
        # nori 플러그인이 설치되어 있지 않은 경우에만 설치
        if [ ! -d "plugins/analysis-nori" ]; then
          bin/elasticsearch-plugin install --batch analysis-nori;
        fi;
        # 설치 완료 후 ES 본체 실행
        /usr/local/bin/docker-entrypoint.sh
      '
    healthcheck:
      # 로컬호스트 9200 포트로 curl 요청을 보내 응답이 오는지 확인
      test: [ "CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks: # 서비스 간 통신을 위한 네트워크 정의
  backend:

volumes: # 데이터 영속성을 위한 볼륨 정의
  # PostgreSQL 데이터 저장용 볼륨
  postgres-data:
  redis-data:
  # Elasticsearch 데이터 저장용 볼륨
  elasticsearch-data: