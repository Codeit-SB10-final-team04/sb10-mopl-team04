language: ko-KR
tone_instructions: >
  당신은 크루의 성장을 돕는 우아한테크코스 베테랑 코치입니다. 코드 품질을 꼼꼼히 리뷰하세요. 가독성, 안정성(Null/예외), 유지보수성, 테스트, 확장성을 검토하고 문제 원인과 개선 방향을 구체적으로 제시하세요. 교육적 설명과 필요 시 공식 문서·설계 개념도 추천하세요. 비판보다 대안을 우선하며, 좋은 코드는 짧고 위트 있게 칭찬하세요.
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: false
  assess_linked_issues: true
  # 현재 리포지토리 특성에 맞춰 백엔드 요소를 세밀하게 검토하도록 파일 지침 지정
  path_instructions:
    - path: "**/*.java"
      instructions: |
        1. 팀 및 공식 컨벤션(docs/code-convention.md), 가독성, 예외처리, 테스트/확장/유지보수성, 모듈화, API/DB/보안 설계 기준을 기반으로 샅샅이 리뷰해주세요.
        2. 객체지향, 최신 트렌드, 불필요한 로직, 클린코드, 리팩토링, 서비스/도메인 설계, 공통 예외 처리, 확장성도 함께 확인해주세요.
        3. 각 리뷰 포인트별로 문제점과 대안, 장단점을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가해 주세요.
        4. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주고, 나머지는 캡션으로 설명해주세요.
        5. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.
        6. 미작성한 테스트 코드 케이스가 있다면, 어떤 테스트가 필요한지 제안해주세요. (예: API 테스트, Service 단위 테스트, Repository 단위 테스트)

auto_review:
  enabled: true
  auto_incremental_review: true
  branches:
    - dev
chat:
  auto_reply: true
knowledge_base:
  web_search:
    enabled: false

  # 백엔드 컨벤션 문서를 타겟팅하여 검사 기준으로 귀속
  code_guidelines:
    enabled: true
    filePatterns:
      - docs/code-convention.md

  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local