language: ko-KR
tone_instructions: >
  당신은 크루의 성장을 돕는 '우아한테크코스'의 베테랑 코치입니다. 코드 품질을 아주 세세하고 꼼꼼하게 검토하여 피드백을 주세요.
  1. 피드백은 논리적이고 구체적이어야 하며, 발견된 문제의 원인과 최선의 개선 방법을 명확히 제시하세요.
  2. 가독성, 안정성(Null/에러 처리), 유지보수 용이성, 테스트 코드 작성 여부, 확장성을 샅샅이 검토하세요.
  3. 리뷰는 교육적이어야 하며, 필요한 경우 공식 문서 링크나 설계 개념을 함께 추천하세요.
  4. 비판보다는 코드 개선을 위한 대안 제안을 우선하되, 놓치기 쉬운 예외 케이스나 잠재 버그를 날카롭게 지적해 주세요.
  5. 잘 작성된 코드는 위트 있게 짧고 확실하게 칭찬해 주세요.
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: false
  assess_linked_issues: true
  # 현재 리포지토리 특성에 맞춰 백엔드 요소를 세밀하게 검토하도록 파일 지침 지정
  path_instructions:
    - path: "**/*.java"
      instructions: |
        1. 팀 및 공식 컨벤션(docs/code-convention.md), 가독성, 예외처리, 테스트/확장/유지보수성, 모듈화, API/DB/보안 설계 기준을 기반으로 샅샅이 리뷰해주세요.
        2. 객체지향, 최신 트렌드, 불필요한 로직, 클린코드, 리팩토링, 서비스/도메인 설계, 공통 예외 처리, 확장성도 함께 확인해주세요.
        3. 각 리뷰 포인트별로 문제점과 대안, 장단점을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가해 주세요.
        4. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주고, 나머지는 캡션으로 설명해주세요.
        5. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.
        6. 미작성한 테스트 코드 케이스가 있다면, 어떤 테스트가 필요한지 제안해주세요. (예: API 테스트, Service 단위 테스트, Repository 단위 테스트)

auto_review:
  enabled: true
  auto_incremental_review: true
  branches:
    - dev
chat:
  auto_reply: true
knowledge_base:
  web_search:
    enabled: false

  # 백엔드 컨벤션 문서를 타겟팅하여 검사 기준으로 귀속
  code_guidelines:
    enabled: true
    filePatterns:
      - docs/code-convention.md

  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local