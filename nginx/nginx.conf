worker_processes auto;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	server_tokens off;

	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
					'$status $body_bytes_sent "$http_referer" '
					'"$http_user_agent" "$http_x_forwarded_for"';

	access_log /var/log/nginx/access.log main;
	error_log /var/log/nginx/error.log warn;

	sendfile on;
	keepalive_timeout 65;

	# WebSocket 업그레이드용
	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

	# 앱 서버 (private 서브넷 EC2, Round Robin 로드밸런싱)
	upstream backend {
		server 10.0.11.142:8080;  # mopl-app-1
		server 10.0.11.58:8080;   # mopl-app-2
	}

	# HTTP → HTTPS 리다이렉트
	server {
		listen 80;
		server_name mopl.kr www.mopl.kr;

		# 헬스체크는 HTTP로 유지 (ALB/ECS 헬스체크용)
		location = /health {
			access_log off;
			return 200 'OK';
		}

		# 나머지는 HTTPS로 리다이렉트
		location / {
			return 301 https://$host$request_uri;
		}
	}

	# HTTPS 서버
	server {
		listen 443 ssl;
		server_name mopl.kr www.mopl.kr;

		# SSL 인증서 (Let's Encrypt)
		ssl_certificate /etc/letsencrypt/live/mopl.kr/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/mopl.kr/privkey.pem;

		# SSL 보안 설정
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_prefer_server_ciphers on;

		# 파일 업로드 허용 크기
		client_max_body_size 10m;

		# /api/sse/* → SSE (버퍼링 반드시 off)
		location ^~ /api/sse {
			proxy_pass http://backend;
			proxy_http_version 1.1;
			proxy_buffering off;
			proxy_cache off;
			proxy_set_header Connection '';
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_read_timeout 3600s;
		}

		# /api/* → 백엔드 API 프록시
		location ^~ /api/ {
			proxy_pass http://backend;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		}

		# /ws/* → WebSocket (STOMP) 프록시
		location ^~ /ws/ {
			proxy_pass http://backend;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_read_timeout 3600s;
			proxy_send_timeout 3600s;
		}

		# 그 외 모든 요청 → app으로 프록시
		location / {
			proxy_pass http://backend;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		}
	}
}
